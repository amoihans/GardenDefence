<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- legs -->
  <rect x="34" y="72" width="10" height="20" fill="#37474f"/>
  <rect x="52" y="72" width="10" height="20" fill="#37474f"/>
  <rect x="32" y="88" width="14" height="4" fill="#212121"/>
  <rect x="50" y="88" width="14" height="4" fill="#212121"/>
  <!-- body -->
  <rect x="28" y="44" width="40" height="32" fill="#33691e"/>
  <!-- newspaper shield in front -->
  <rect x="36" y="42" width="36" height="34" fill="#fafafa" stroke="#5d4037" stroke-width="1"/>
  <line x1="36" y1="48" x2="72" y2="48" stroke="#5d4037" stroke-width="0.5"/>
  <line x1="36" y1="54" x2="72" y2="54" stroke="#5d4037" stroke-width="0.5"/>
  <line x1="36" y1="60" x2="72" y2="60" stroke="#5d4037" stroke-width="0.5"/>
  <line x1="36" y1="66" x2="72" y2="66" stroke="#5d4037" stroke-width="0.5"/>
  <line x1="36" y1="72" x2="72" y2="72" stroke="#5d4037" stroke-width="0.5"/>
  <text x="40" y="50" font-size="6" fill="#222" font-family="serif">DAILY</text>
  <text x="40" y="62" font-size="6" fill="#222" font-family="serif">NEWS</text>
  <line x1="40" y1="66" x2="68" y2="66" stroke="#222" stroke-width="1"/>
  <!-- head (peeking above newspaper) -->
  <ellipse cx="48" cy="32" rx="18" ry="18" fill="#a5d6a7"/>
  <ellipse cx="32" cy="32" rx="4" ry="6" fill="#81c784"/>
  <ellipse cx="64" cy="32" rx="4" ry="6" fill="#81c784"/>
  <!-- glasses (newspaper reader) -->
  <circle cx="42" cy="30" r="4" fill="none" stroke="#222" stroke-width="1.5"/>
  <circle cx="54" cy="30" r="4" fill="none" stroke="#222" stroke-width="1.5"/>
  <line x1="46" y1="30" x2="50" y2="30" stroke="#222" stroke-width="1.5"/>
  <circle cx="42" cy="30" r="1" fill="#000"/>
  <circle cx="54" cy="30" r="1" fill="#000"/>
  <path d="M 40 40 Q 48 42 56 40" stroke="#000" stroke-width="1.5" fill="none"/>
  <!-- arm holding paper -->
  <rect x="20" y="46" width="14" height="8" fill="#a5d6a7"/>
  <rect x="14" y="44" width="8" height="12" fill="#81c784"/>
</svg>
