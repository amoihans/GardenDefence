<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="100" height="140">
  <!-- 绳子 -->
  <line x1="50" y1="60" x2="50" y2="90" stroke="#5D4037" stroke-width="1.5"/>
  <!-- 气球（红色） -->
  <ellipse cx="50" cy="35" rx="22" ry="28" fill="#E53935"/>
  <!-- 气球高光 -->
  <ellipse cx="42" cy="25" rx="5" ry="8" fill="#FFCDD2" opacity="0.7"/>
  <!-- 气球底部结 -->
  <ellipse cx="50" cy="62" rx="3" ry="2" fill="#B71C1C"/>
  <!-- 僵尸头（在气球下方） -->
  <circle cx="50" cy="100" r="14" fill="#8D6E63"/>
  <!-- 眼睛 -->
  <circle cx="44" cy="98" r="3" fill="white"/>
  <circle cx="56" cy="98" r="3" fill="white"/>
  <circle cx="44" cy="100" r="1.5" fill="black"/>
  <circle cx="56" cy="100" r="1.5" fill="black"/>
  <!-- 嘴巴（O 形） -->
  <ellipse cx="50" cy="108" rx="3" ry="3" fill="black"/>
  <!-- 僵尸身体（小型，示意飞行） -->
  <rect x="42" y="113" width="16" height="18" fill="#5D4037" rx="2"/>
  <!-- 手臂（抓着绳子） -->
  <line x1="42" y1="118" x2="50" y2="92" stroke="#8D6E63" stroke-width="2"/>
  <line x1="58" y1="118" x2="50" y2="92" stroke="#8D6E63" stroke-width="2"/>
</svg>
