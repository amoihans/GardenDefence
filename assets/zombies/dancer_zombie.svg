<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- legs -->
  <rect x="34" y="72" width="10" height="20" fill="#37474f"/>
  <rect x="52" y="72" width="10" height="20" fill="#37474f"/>
  <rect x="32" y="88" width="14" height="4" fill="#212121"/>
  <rect x="50" y="88" width="14" height="4" fill="#212121"/>
  <!-- sparkles / disco ball effect -->
  <g fill="#ffeb3b" opacity="0.8">
    <circle cx="14" cy="20" r="2"/>
    <circle cx="84" cy="20" r="2"/>
    <circle cx="20" cy="50" r="1.5"/>
    <circle cx="80" cy="50" r="1.5"/>
    <circle cx="10" cy="36" r="1"/>
    <circle cx="86" cy="36" r="1"/>
  </g>
  <!-- body (disco jacket, blue glitter) -->
  <rect x="26" y="38" width="44" height="36" fill="#1565c0"/>
  <rect x="26" y="38" width="44" height="6" fill="#42a5f5"/>
  <!-- bow tie -->
  <path d="M 42 36 L 48 40 L 54 36 L 54 44 L 48 40 L 42 44 Z" fill="#c62828"/>
  <!-- arms (one up, one down - dancing) -->
  <rect x="14" y="28" width="12" height="8" fill="#a5d6a7" transform="rotate(-30 20 32)"/>
  <rect x="70" y="48" width="12" height="8" fill="#a5d6a7" transform="rotate(30 76 52)"/>
  <rect x="12" y="22" width="6" height="10" fill="#81c784" transform="rotate(-30 15 27)"/>
  <rect x="76" y="56" width="6" height="10" fill="#81c784" transform="rotate(30 79 61)"/>
  <!-- head -->
  <ellipse cx="48" cy="28" rx="18" ry="18" fill="#a5d6a7"/>
  <ellipse cx="32" cy="28" rx="4" ry="6" fill="#81c784"/>
  <ellipse cx="64" cy="28" rx="4" ry="6" fill="#81c784"/>
  <!-- disco afro / hair -->
  <ellipse cx="48" cy="14" rx="20" ry="10" fill="#1a1a1a"/>
  <ellipse cx="38" cy="16" rx="6" ry="8" fill="#2a2a2a"/>
  <ellipse cx="58" cy="16" rx="6" ry="8" fill="#2a2a2a"/>
  <!-- star sunglasses -->
  <circle cx="42" cy="26" r="5" fill="#0d0d0d" stroke="#ffeb3b" stroke-width="1"/>
  <circle cx="54" cy="26" r="5" fill="#0d0d0d" stroke="#ffeb3b" stroke-width="1"/>
  <line x1="46" y1="26" x2="50" y2="26" stroke="#ffeb3b" stroke-width="1.5"/>
  <g fill="#ffeb3b">
    <circle cx="42" cy="26" r="1.5"/>
    <circle cx="54" cy="26" r="1.5"/>
  </g>
  <!-- big smile -->
  <path d="M 38 36 Q 48 44 58 36" stroke="#000" stroke-width="2" fill="#3e2723"/>
  <rect x="46" y="38" width="3" height="4" fill="#fff"/>
</svg>
