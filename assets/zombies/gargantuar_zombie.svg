<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="120" height="180">
  <!-- 巨大的身躯 -->
  <rect x="25" y="60" width="70" height="100" fill="#5D4037" rx="6"/>
  <!-- 肚子（略浅） -->
  <rect x="35" y="90" width="50" height="60" fill="#795548" rx="4"/>
  <!-- 头（小，相对身躯） -->
  <circle cx="60" cy="40" r="22" fill="#8D6E63"/>
  <!-- 眼睛（凶狠） -->
  <circle cx="50" cy="38" r="4" fill="white"/>
  <circle cx="70" cy="38" r="4" fill="white"/>
  <circle cx="50" cy="40" r="2" fill="black"/>
  <circle cx="70" cy="40" r="2" fill="black"/>
  <!-- 眉毛（凶） -->
  <line x1="44" y1="30" x2="56" y2="32" stroke="black" stroke-width="2"/>
  <line x1="64" y1="32" x2="76" y2="30" stroke="black" stroke-width="2"/>
  <!-- 嘴巴（龇牙） -->
  <path d="M 50 50 L 55 55 L 60 50 L 65 55 L 70 50" stroke="black" stroke-width="2" fill="white"/>
  <!-- 左手（粗壮） -->
  <rect x="14" y="70" width="14" height="40" fill="#5D4037" rx="3"/>
  <!-- 右手 -->
  <rect x="92" y="70" width="14" height="40" fill="#5D4037" rx="3"/>
  <!-- 双脚 -->
  <rect x="35" y="155" width="18" height="20" fill="#3E2723" rx="2"/>
  <rect x="67" y="155" width="18" height="20" fill="#3E2723" rx="2"/>
  <!-- 锁链/腰带（标识 Boss） -->
  <rect x="35" y="105" width="50" height="4" fill="#212121"/>
  <circle cx="60" cy="107" r="3" fill="#FFC107"/>
</svg>
