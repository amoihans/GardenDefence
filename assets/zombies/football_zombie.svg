<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- legs -->
  <rect x="34" y="72" width="10" height="20" fill="#212121"/>
  <rect x="52" y="72" width="10" height="20" fill="#212121"/>
  <rect x="32" y="88" width="14" height="4" fill="#0d0d0d"/>
  <rect x="50" y="88" width="14" height="4" fill="#0d0d0d"/>
  <!-- body -->
  <rect x="28" y="42" width="40" height="34" fill="#5d4037"/>
  <!-- shoulder pads -->
  <ellipse cx="22" cy="44" rx="8" ry="6" fill="#757575"/>
  <ellipse cx="74" cy="44" rx="8" ry="6" fill="#757575"/>
  <!-- arms -->
  <rect x="14" y="46" width="10" height="8" fill="#a5d6a7"/>
  <rect x="72" y="46" width="10" height="8" fill="#a5d6a7"/>
  <!-- head -->
  <ellipse cx="48" cy="32" rx="18" ry="18" fill="#a5d6a7"/>
  <ellipse cx="32" cy="32" rx="4" ry="6" fill="#81c784"/>
  <ellipse cx="64" cy="32" rx="4" ry="6" fill="#81c784"/>
  <!-- football helmet -->
  <ellipse cx="48" cy="24" rx="20" ry="14" fill="#1976d2"/>
  <ellipse cx="48" cy="22" rx="18" ry="12" fill="#2196f3"/>
  <rect x="38" y="14" width="20" height="3" fill="#fff"/>
  <!-- face mask -->
  <g stroke="#fff" stroke-width="2" fill="none">
    <line x1="36" y1="28" x2="36" y2="38"/>
    <line x1="42" y1="30" x2="42" y2="40"/>
    <line x1="48" y1="30" x2="48" y2="40"/>
    <line x1="54" y1="30" x2="54" y2="40"/>
    <line x1="60" y1="28" x2="60" y2="38"/>
    <line x1="36" y1="32" x2="60" y2="32"/>
  </g>
  <!-- eyes peeking -->
  <circle cx="44" cy="36" r="2" fill="#fff"/>
  <circle cx="52" cy="36" r="2" fill="#fff"/>
  <circle cx="44" cy="37" r="1" fill="#d32f2f"/>
  <circle cx="52" cy="37" r="1" fill="#d32f2f"/>
</svg>
