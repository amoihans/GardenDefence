<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- body (small imp, leaning forward) -->
  <ellipse cx="60" cy="44" rx="14" ry="20" fill="#5d4037" transform="rotate(20 60 44)"/>
  <!-- legs (running pose) -->
  <rect x="44" y="60" width="8" height="20" fill="#37474f" transform="rotate(-20 48 70)"/>
  <rect x="58" y="60" width="8" height="20" fill="#37474f" transform="rotate(20 62 70)"/>
  <rect x="42" y="76" width="12" height="4" fill="#212121" transform="rotate(-20 48 78)"/>
  <rect x="58" y="76" width="12" height="4" fill="#212121" transform="rotate(20 64 78)"/>
  <!-- arms (windmilling) -->
  <rect x="40" y="36" width="8" height="18" fill="#a5d6a7" transform="rotate(-30 44 45)"/>
  <rect x="68" y="36" width="8" height="18" fill="#a5d6a7" transform="rotate(30 72 45)"/>
  <rect x="34" y="30" width="6" height="10" fill="#81c784" transform="rotate(-30 37 35)"/>
  <rect x="74" y="30" width="6" height="10" fill="#81c784" transform="rotate(30 77 35)"/>
  <!-- head -->
  <ellipse cx="68" cy="32" rx="16" ry="16" fill="#a5d6a7"/>
  <ellipse cx="54" cy="32" rx="4" ry="6" fill="#81c784"/>
  <ellipse cx="82" cy="32" rx="4" ry="6" fill="#81c784"/>
  <!-- hair tufts (wild) -->
  <path d="M 56 18 L 58 12 M 64 14 L 66 8 M 72 14 L 74 8 M 80 18 L 82 14" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- eyes (crazy) -->
  <circle cx="62" cy="28" r="4" fill="#fff"/>
  <circle cx="74" cy="28" r="4" fill="#fff"/>
  <circle cx="64" cy="29" r="2" fill="#d32f2f"/>
  <circle cx="76" cy="29" r="2" fill="#d32f2f"/>
  <!-- mouth (open scream) -->
  <ellipse cx="68" cy="40" rx="6" ry="4" fill="#3e2723"/>
  <ellipse cx="68" cy="40" rx="3" ry="2" fill="#c62828"/>
  <!-- small flames around (diving motion) -->
  <g fill="#ff6f00" opacity="0.85">
    <path d="M 20 80 L 26 72 L 28 80 L 24 84 Z"/>
    <path d="M 14 90 L 22 82 L 24 90 L 18 92 Z"/>
  </g>
</svg>
