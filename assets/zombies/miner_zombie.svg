<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <!-- 镐头（右上角） -->
  <rect x="65" y="20" width="20" height="6" fill="#8D6E63" rx="1" transform="rotate(45 75 23)"/>
  <path d="M 80 18 L 92 30 L 88 34 L 76 22 Z" fill="#9E9E9E"/>
  <!-- 头（戴矿工帽） -->
  <ellipse cx="50" cy="45" rx="22" ry="20" fill="#8D6E63"/>
  <!-- 矿工帽 -->
  <path d="M 28 35 L 28 28 Q 50 18 72 28 L 72 35 Z" fill="#424242"/>
  <!-- 帽灯 -->
  <circle cx="50" cy="25" r="4" fill="#FFEB3B"/>
  <circle cx="50" cy="25" r="2" fill="white"/>
  <!-- 眼睛 -->
  <circle cx="42" cy="45" r="3" fill="white"/>
  <circle cx="58" cy="45" r="3" fill="white"/>
  <circle cx="42" cy="47" r="1.5" fill="black"/>
  <circle cx="58" cy="47" r="1.5" fill="black"/>
  <!-- 嘴巴（紧张） -->
  <line x1="44" y1="55" x2="56" y2="55" stroke="black" stroke-width="2"/>
  <!-- 身体（矿工服） -->
  <rect x="30" y="65" width="40" height="40" fill="#5D4037" rx="3"/>
  <!-- 胸口工牌 -->
  <rect x="44" y="72" width="12" height="10" fill="#FFEB3B" rx="1"/>
  <!-- 双手（握镐） -->
  <line x1="35" y1="80" x2="80" y2="35" stroke="#8D6E63" stroke-width="3"/>
  <!-- 双脚 -->
  <rect x="36" y="103" width="12" height="14" fill="#3E2723" rx="2"/>
  <rect x="52" y="103" width="12" height="14" fill="#3E2723" rx="2"/>
</svg>
