<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- pot -->
  <ellipse cx="48" cy="82" rx="22" ry="6" fill="#5d4037"/>
  <rect x="28" y="72" width="40" height="12" fill="#795548" rx="2"/>
  <!-- pepper stem (green leaves on top) -->
  <ellipse cx="48" cy="30" rx="6" ry="3" fill="#558b2f"/>
  <ellipse cx="42" cy="28" rx="5" ry="2.5" fill="#7cb342" transform="rotate(-30 42 28)"/>
  <ellipse cx="54" cy="28" rx="5" ry="2.5" fill="#7cb342" transform="rotate(30 54 28)"/>
  <!-- pepper body (bright red) -->
  <path d="M 32 36 Q 30 50 36 60 Q 40 70 48 70 Q 56 70 60 60 Q 66 50 64 36 Q 60 32 48 32 Q 36 32 32 36 Z" fill="#d32f2f"/>
  <path d="M 36 40 Q 34 50 38 58 Q 42 66 48 66 Q 54 66 58 58 Q 62 50 60 40 Q 58 36 48 36 Q 38 36 36 40 Z" fill="#f44336"/>
  <!-- highlight -->
  <ellipse cx="42" cy="46" rx="4" ry="6" fill="#ef9a9a" opacity="0.7"/>
  <!-- eyes (angry) -->
  <path d="M 42 48 L 47 50" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <path d="M 54 50 L 49 50" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <circle cx="48" cy="55" r="1.5" fill="#000"/>
  <!-- mouth (fierce grin) -->
  <path d="M 42 60 Q 48 64 54 60" stroke="#000" stroke-width="2" fill="#3e2723" stroke-linecap="round"/>
  <!-- tiny flames around (gives "explosive" vibe) -->
  <g fill="#ff6f00" opacity="0.85">
    <path d="M 24 56 Q 22 50 26 48 Q 24 46 28 44 L 26 50 Z"/>
    <path d="M 72 56 Q 74 50 70 48 Q 72 46 68 44 L 70 50 Z"/>
    <path d="M 18 64 Q 16 60 20 58 L 18 64 Z"/>
    <path d="M 78 64 Q 80 60 76 58 L 78 64 Z"/>
  </g>
</svg>
