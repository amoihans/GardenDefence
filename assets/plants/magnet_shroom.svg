<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">
  <!-- 茎 -->
  <rect x="35" y="55" width="10" height="35" fill="#388E3C" rx="2"/>
  <!-- 菌盖（马蹄形磁铁造型） -->
  <rect x="22" y="20" width="36" height="14" fill="#D32F2F" rx="3"/>
  <rect x="22" y="20" width="36" height="6" fill="#B71C1C"/>
  <rect x="22" y="32" width="36" height="6" fill="#1976D2"/>
  <!-- 磁极 U 形 -->
  <rect x="22" y="34" width="6" height="14" fill="#D32F2F"/>
  <rect x="52" y="34" width="6" height="14" fill="#1976D2"/>
  <!-- 菌盖上的眼睛（与磁铁一起像人脸） -->
  <ellipse cx="30" cy="42" rx="4" ry="5" fill="white"/>
  <ellipse cx="50" cy="42" rx="4" ry="5" fill="white"/>
  <circle cx="30" cy="44" r="2" fill="#1B5E20"/>
  <circle cx="50" cy="44" r="2" fill="#1B5E20"/>
  <!-- 嘴巴（O 形惊讶） -->
  <ellipse cx="40" cy="54" rx="3" ry="3" fill="#1B5E20"/>
  <!-- 磁场线（表示吸引金属） -->
  <path d="M 10 30 Q 16 35 22 30" stroke="#1976D2" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 58 30 Q 64 35 70 30" stroke="#D32F2F" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>
