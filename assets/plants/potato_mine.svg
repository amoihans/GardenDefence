<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- dirt mound (looks half buried when not armed) -->
  <ellipse cx="48" cy="74" rx="32" ry="14" fill="#5d4037"/>
  <ellipse cx="48" cy="68" rx="28" ry="10" fill="#795548"/>
  <!-- potato body (always visible but small when buried) -->
  <ellipse cx="48" cy="56" rx="22" ry="18" fill="#a1887f"/>
  <ellipse cx="48" cy="54" rx="18" ry="14" fill="#bcaaa4"/>
  <!-- spots -->
  <circle cx="38" cy="50" r="2" fill="#8d6e63"/>
  <circle cx="58" cy="48" r="2.5" fill="#8d6e63"/>
  <circle cx="42" cy="62" r="2" fill="#8d6e63"/>
  <circle cx="54" cy="64" r="2" fill="#8d6e63"/>
  <!-- eyes -->
  <circle cx="42" cy="52" r="3" fill="#fff"/>
  <circle cx="54" cy="52" r="3" fill="#fff"/>
  <circle cx="42" cy="53" r="1.5" fill="#000"/>
  <circle cx="54" cy="53" r="1.5" fill="#000"/>
  <!-- red nose / plunger (the "armed" indicator) -->
  <rect x="46" y="60" width="4" height="6" fill="#424242"/>
  <circle cx="48" cy="64" r="5" fill="#c62828"/>
  <circle cx="46" cy="62" r="2" fill="#ef5350"/>
