<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- pot -->
  <ellipse cx="48" cy="82" rx="22" ry="6" fill="#5d4037"/>
  <rect x="28" y="72" width="40" height="12" fill="#795548" rx="2"/>
  <!-- stem -->
  <rect x="40" y="38" width="8" height="38" fill="#0d47a1"/>
  <ellipse cx="32" cy="58" rx="10" ry="5" fill="#1976d2" transform="rotate(-25 32 58)"/>
  <ellipse cx="56" cy="64" rx="10" ry="5" fill="#1976d2" transform="rotate(25 56 64)"/>
  <!-- head body (icy blue) -->
  <ellipse cx="50" cy="34" rx="20" ry="18" fill="#4fc3f7"/>
  <ellipse cx="50" cy="36" rx="14" ry="12" fill="#81d4fa"/>
  <!-- mouth -->
  <rect x="64" y="30" width="14" height="10" rx="2" fill="#01579b"/>
  <circle cx="78" cy="35" r="5" fill="#0277bd"/>
  <circle cx="79" cy="35" r="2.5" fill="#000"/>
  <!-- eye -->
  <circle cx="44" cy="30" r="4" fill="#fff"/>
  <circle cx="46" cy="31" r="2" fill="#000"/>
  <!-- frost crystals on top -->
  <g stroke="#e1f5fe" stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="34" y1="20" x2="30" y2="14"/>
    <line x1="40" y1="16" x2="40" y2="10"/>
    <line x1="48" y1="14" x2="48" y2="8"/>
    <line x1="56" y1="16" x2="56" y2="10"/>
    <line x1="62" y1="20" x2="66" y2="14"/>
  </g>
  <!-- leaf -->
  <ellipse cx="36" cy="40" rx="6" ry="3" fill="#1976d2" transform="rotate(-30 36 40)"/>
</svg>
