<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- pot -->
  <ellipse cx="48" cy="82" rx="22" ry="6" fill="#5d4037"/>
  <rect x="28" y="72" width="40" height="12" fill="#795548" rx="2"/>
  <!-- mushroom stem -->
  <ellipse cx="48" cy="62" rx="14" ry="20" fill="#fff8e1"/>
  <ellipse cx="48" cy="60" rx="11" ry="17" fill="#fffde7"/>
  <!-- mushroom cap (small/muted before growth) -->
  <ellipse cx="48" cy="36" rx="28" ry="20" fill="#8d6e63"/>
  <ellipse cx="48" cy="34" rx="25" ry="17" fill="#a1887f"/>
  <!-- spots -->
  <circle cx="36" cy="30" r="3" fill="#fffde7" opacity="0.7"/>
  <circle cx="56" cy="28" r="2.5" fill="#fffde7" opacity="0.7"/>
  <circle cx="46" cy="40" r="2" fill="#fffde7" opacity="0.7"/>
  <circle cx="60" cy="38" r="1.5" fill="#fffde7" opacity="0.7"/>
  <!-- sleepy face (small mushroom) -->
  <ellipse cx="42" cy="48" rx="2" ry="3" fill="#5d4037"/>
  <ellipse cx="54" cy="48" rx="2" ry="3" fill="#5d4037"/>
  <path d="M 42 56 Q 48 58 54 56" stroke="#5d4037" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- zzz (sleeping) -->
  <text x="66" y="40" font-size="12" font-family="serif" fill="#fff" stroke="#000" stroke-width="0.3" font-style="italic">z</text>
  <text x="72" y="34" font-size="8" font-family="serif" fill="#fff" stroke="#000" stroke-width="0.3" font-style="italic">z</text>
</svg>
